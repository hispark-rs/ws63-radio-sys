name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: clippy,rustfmt,rust-src
      - name: Install RISC-V C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-riscv64-unknown-elf
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: python3 scripts/check-upstream-hostap.py
      - name: Check supplicant C ABI
        run: |
          printf '#include "hisi_wpa_supplicant.h"\nint main(void) { return 0; }\n' |
            cc -std=c11 -Wall -Wextra -Werror -I include -x c -c -o /tmp/hisi-wpa-abi.o -
      - run: python3 scripts/check-native-supplicant-port.py
      - name: Build native supplicant archive for WS63
        run: |
          cargo check -Zbuild-std=core,alloc \
            --target riscv32imfc-unknown-none-elf \
            -p ws63-radio-sys --features upstream-supplicant-port --locked
      - run: python3 crates/hisi-rf-link/python/test_relocations.py
      - run: cargo package -p hisi-rf-link --locked
