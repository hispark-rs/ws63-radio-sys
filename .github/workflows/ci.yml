name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: clippy,rustfmt,rust-src
      - name: Install native and RISC-V inspection toolchains
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-riscv64-unknown-elf libssl-dev pkg-config
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --target x86_64-unknown-linux-gnu --locked -- -D warnings
      - run: cargo test --workspace --target x86_64-unknown-linux-gnu --locked
      - run: uv run scripts/check-upstream-hostap.py
      - run: uv run scripts/check-runtime-compat-profile.py
      - run: uv run scripts/check-supplicant-boundary-profile.py
      - name: Rebuild normalized release artifacts
        run: uv run scripts/check-release-artifacts.py
      - name: Check supplicant C ABI
        run: |
          printf '#include "hisi_wpa_supplicant.h"\nint main(void) { return 0; }\n' |
            cc -std=c11 -Wall -Wextra -Werror -I include -x c -c -o /tmp/hisi-wpa-abi.o -
      - run: uv run scripts/check-native-supplicant-port.py
      - name: Replay upstream WPA Personal protocol vectors
        run: uv run scripts/check-upstream-personal-vectors.py
      - name: Check release-unit metadata
        run: uv run scripts/check-release-unit.py
      - name: Build native supplicant archive for WS63
        run: |
          cargo check -Zbuild-std=core,alloc \
            --target riscv32imfc-unknown-none-elf \
            -p ws63-radio-sys --features upstream-supplicant-port --locked
          cargo check -Zbuild-std=core,alloc \
            --target riscv32imfc-unknown-none-elf \
            -p ws63-radio-sys --features upstream-supplicant-wpa3 --locked
      - run: uv run crates/hisi-rf-link/python/test_relocations.py
      - name: Package release unit
        run: |
          cargo package -p hisi-rf-link --locked --target x86_64-unknown-linux-gnu
          cargo package -p ws63-radio-blob --locked --no-verify
          cargo package -p ws63-radio-sys --locked --no-verify --list \
            > target/ws63-radio-sys-package-files.txt

  native-archive-repro:
    name: Rebuild native hostap archives
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      RISCV_HOMEBREW_TAP_COMMIT: 2434aac00803d570c1b04190c76f647e7d1661e7
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
      - name: Install pinned canonical RISC-V toolchain
        run: |
          brew tap riscv-software-src/riscv
          tap="$(brew --repository riscv-software-src/riscv)"
          git -C "$tap" checkout "$RISCV_HOMEBREW_TAP_COMMIT"
          brew trust riscv-software-src/riscv
          brew uninstall --force riscv-gnu-toolchain || true
          brew install riscv-software-src/riscv/riscv-gnu-toolchain
      - name: Rebuild and compare target archives
        run: |
          case "${RUNNER_ARCH}" in
            ARM64) host_target=aarch64-apple-darwin ;;
            X64) host_target=x86_64-apple-darwin ;;
            *) echo "unsupported macOS runner architecture: ${RUNNER_ARCH}" >&2; exit 1 ;;
          esac
          cargo run -p hisi-rf-link --locked --target "$host_target" -- \
            rebuild-native-supplicant \
            --repository-root . \
            --output-dir target/native-supplicant-rebuild \
            --compiler "$(command -v riscv64-unknown-elf-gcc)" \
            --archiver "$(command -v riscv64-unknown-elf-ar)"
      - uses: actions/upload-artifact@v4
        with:
          name: rebuilt-native-supplicant-archives
          path: target/native-supplicant-rebuild/libhisi_wpa_native_port_*.a
          if-no-files-found: error
          retention-days: 7

  consumer-artifacts:
    name: Consumer artifacts (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            host: x86_64-unknown-linux-gnu
          - os: macos-15
            host: aarch64-apple-darwin
          - os: windows-latest
            host: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      # Deliberately omit submodules: consumer builds must use only packaged
      # Cargo artifacts, never the vendor archive/source checkout.
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: rust-src
      - name: Expand and validate packaged radio artifacts
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/ws63 consumer 构建
        run: cargo check -p ws63-radio-blob --target ${{ matrix.host }} --locked
      - name: Build WPA2 Cargo consumer contract
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/ws63 consumer 构建
        run: >-
          cargo check "-Zbuild-std=core,alloc"
          --target riscv32imfc-unknown-none-elf
          -p ws63-radio-sys --features upstream-supplicant-port --locked
      - name: Build WPA3 Cargo consumer contract
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/ws63 consumer 构建
        run: >-
          cargo check "-Zbuild-std=core,alloc"
          --target riscv32imfc-unknown-none-elf
          -p ws63-radio-sys --features upstream-supplicant-wpa3 --locked
