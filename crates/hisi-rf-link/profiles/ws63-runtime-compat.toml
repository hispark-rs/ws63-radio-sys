revision = "ws63-runtime-compat-2026-07-19"
archive_profile_revision = "ws63-rf-2026-07-13"

# This is the exact LiteOS/architecture namespace referenced by the base Wi-Fi
# archives selected by ws63.toml. `provided` symbols form the bounded Rust ABI
# adapter. `off-path` symbols occur only in archive members discarded by the
# current Wi-Fi init/connect link closure; a final upstream-supplicant ELF must
# not define them.
namespace_patterns = ["^Arch", "^LOS_", "^Os", "^reg_rw_check_addr$"]

# Adapter-only semantics derived from the exact WS63 LiteOS configuration and
# headers used by the payload oracle. These values do not define the generic
# hisi-rf-rtos-driver contract.
[semantics.priority]
minimum = 0
maximum = 31
ordering = "lower-number-higher"

[semantics.time]
ticks_per_second = 100
wait_forever = 0xffffffff
milliseconds_to_ticks = "ceil-saturating-u32"
ticks_to_milliseconds = "floor-saturating-u32"
duration_overflow = "saturate-u32-max"

[semantics.return_codes]
success = 0x00000000
failure = 0x00000001
semaphore_timeout = 0x02000707
mutex_timeout = 0x02001d07

[[symbols]]
name = "ArchIntLock"
classification = "provided"
provider = "ws63-rf-rs::ws63_runtime_compat"

[[symbols]]
name = "ArchIntRestore"
classification = "provided"
provider = "ws63-rf-rs::ws63_runtime_compat"

[[symbols]]
name = "LOS_HistoryTaskCpuUsage"
classification = "provided"
provider = "ws63-rf-rs::ws63_runtime_compat"

[[symbols]]
name = "LOS_TaskLock"
