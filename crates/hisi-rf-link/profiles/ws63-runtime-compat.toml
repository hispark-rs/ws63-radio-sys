provider = "ws63-rf-rs::ws63_runtime_compat"

[[symbols]]
name = "LOS_TaskUnlock"
classification = "provided"
provider = "ws63-rf-rs::ws63_runtime_compat"

[[symbols]]
name = "OsGetIdleTaskId"
classification = "provided"
provider = "ws63-rf-rs::ws63_runtime_compat"

[[symbols]]
name = "reg_rw_check_addr"
classification = "provided"
provider = "ws63-rf-rs::ws63_runtime_compat"

[[symbols]]
